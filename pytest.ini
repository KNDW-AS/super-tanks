[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --cov=core
    --cov=scripts
    --cov-report=term-missing:skip-covered
    --cov-fail-under=70
markers =
    slow: marks tests as slow
    integration: integration test (touches real network/disk beyond tmp_path)
timeout = 30
asyncio_mode = auto
