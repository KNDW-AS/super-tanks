<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Super Tanks-merke (utkast): tank med skvalpeskott — lagene som gjer agentar stabile -->
  <rect width="400" height="400" rx="88" fill="#0f172a"/>
  <!-- tankskal -->
  <rect x="92" y="84" width="216" height="232" rx="36" fill="none" stroke="#e2e8f0" stroke-width="14"/>
  <!-- skvalpeskott (baffles) — tre lag, opne i midten -->
  <g stroke="#38bdf8" stroke-width="14" stroke-linecap="round">
    <line x1="118" y1="152" x2="186" y2="152"/>
    <line x1="214" y1="152" x2="282" y2="152"/>
    <line x1="118" y1="216" x2="170" y2="216"/>
    <line x1="230" y1="216" x2="282" y2="216"/>
    <line x1="118" y1="280" x2="186" y2="280"/>
    <line x1="214" y1="280" x2="282" y2="280"/>
  </g>
  <!-- væskelinje i ro -->
  <line x1="118" y1="120" x2="282" y2="120" stroke="#64748b" stroke-width="10" stroke-linecap="round"/>
</svg>
